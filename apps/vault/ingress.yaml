apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
  annotations:
    cert-manager.io/cluster-issuer: local-ca
    # Vault serves plain HTTP inside the cluster (global.tlsDisable=true); the
    # ingress terminates TLS and proxies to the http backend.
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vault.localtest.me
      secretName: vault-tls
  rules:
    - host: vault.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
