# Cluster-wide connection to Vault. Contains NO secret values — only the Vault
# address, KV mount path, and the kubernetes-auth role/ServiceAccount to use.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: external-secrets
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      # KV v2 secrets engine mounted at secret/ (see scripts/vault-configure-eso.sh).
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # Vault kubernetes auth method mount + role.
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "vault-eso-auth"
            namespace: "external-secrets"
