# Example: sync Vault path secret/data/demo into a native k8s Secret.
# This manifest references only the Vault PATH and KEYS — never the values.
# Seed the source secret with:
#   kubectl exec -n vault vault-0 -- vault kv put secret/demo username=demo password=s3cr3t
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: example
    app.kubernetes.io/part-of: external-secrets
spec:
  refreshInterval: "1m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    # k8s Secret that ESO creates/owns and keeps in sync.
    name: demo-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: demo
        property: username
    - secretKey: password
      remoteRef:
        key: demo
        property: password
